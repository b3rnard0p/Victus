spring.datasource.url=jdbc:h2:mem:victus;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.web.resources.static-locations=classpath:/static/

app.bootstrap.enabled=false
app.jwt.secret=TestSecretKeyForJwtNeedsToBeLongEnough123456789
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.cookie.access-token-max-age-seconds=900
app.cookie.refresh-token-max-age-seconds=604800
app.cookie.secure=false
app.cookie.same-site=Strict

