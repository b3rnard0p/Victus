<div th:fragment="toast-templates" style="display: none;">
  <!-- Template para Toast de Erro -->
  <template id="template-toast-error">
    <div class="toast-card flex items-start z-[101] gap-3 rounded-xl border border-red-200 bg-red-50 p-4 shadow-lg w-80 md:w-96 transform transition-all duration-500 translate-x-0 opacity-100 mt-3 pointer-events-auto" style="animation: slideInRight 0.3s ease-out forwards">
      <div class="flex-shrink-0 text-red-500 mt-0.5">
        <i data-lucide="circle-alert" class="w-5 h-5"></i>
      </div>
      <div class="flex-1">
        <h3 class="text-sm font-semibold text-red-800">Erro</h3>
        <p class="mt-1 text-sm text-red-700 toast-message">Mensagem de erro.</p>
      </div>
      <button type="button" class="flex-shrink-0 text-red-500 hover:text-red-700 transition-colors" onclick="this.closest('.toast-card').remove()" aria-label="Fechar">
        <span class="inline-flex h-4 w-4 items-center justify-center font-semibold leading-none">x</span>
      </button>
    </div>
  </template>

  <template id="template-toast-success">
    <div class="toast-card flex items-start z-[101] gap-3 rounded-xl border border-[#4A6E18] bg-[#d6f5b0] p-4 shadow-lg w-80 md:w-96 transform transition-all duration-500 translate-x-0 opacity-100 mt-3 pointer-events-auto" style="animation: slideInRight 0.3s ease-out forwards">
      <div class="flex-shrink-0 text-[#4A6E18] mt-0.5">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
      </div>
      <div class="flex-1">
        <h3 class="text-sm font-semibold text-[#2d4a0e]">Sucesso</h3>
        <p class="mt-1 text-sm text-[#2d4a0e]/80 toast-message">Operação realizada com sucesso!</p>
      </div>
      <button type="button" class="flex-shrink-0 text-[#4A6E18] hover:text-[#2d4a0e] transition-colors" onclick="this.closest('.toast-card').remove()" aria-label="Fechar">
        <span class="inline-flex h-4 w-4 items-center justify-center font-semibold leading-none">x</span>
      </button>
    </div>
  </template>
</div>

<div
  th:fragment="error"
  class="toast-card flex items-start z-[101] gap-3 rounded-xl border border-red-200 bg-red-50 p-4 shadow-lg w-80 md:w-96 transform transition-all duration-500 translate-x-0 opacity-100 mt-3 pointer-events-auto"
  style="animation: slideInRight 0.3s ease-out forwards"
>
  <div class="flex-shrink-0 text-red-500 mt-0.5">
    <i data-lucide="circle-alert" class="w-5 h-5"></i>
  </div>
  <div class="flex-1">
    <h3 class="text-sm font-semibold text-red-800">Erro</h3>
    <p class="mt-1 text-sm text-red-700" th:text="${mensagem}">
      Ocorreu um erro ao processar sua requisição.
    </p>
  </div>
  <button
    type="button"
    class="flex-shrink-0 text-red-500 hover:text-red-700 transition-colors"
    onclick="this.closest('.toast-card').remove()"
    aria-label="Fechar"
  >
    <span
      class="inline-flex h-4 w-4 items-center justify-center font-semibold leading-none"
      >x</span
    >
  </button>
  <script th:replace="~{components/Toast :: toast-script}"></script>
  <style th:replace="~{components/Toast :: toast-style}"></style>
</div>

<div
  th:fragment="success"
  class="toast-card flex items-start z-[101] gap-3 rounded-xl border border-[#4A6E18] bg-[#d6f5b0] p-4 shadow-lg w-80 md:w-96 transform transition-all duration-500 translate-x-0 opacity-100 mt-3 pointer-events-auto"
  style="animation: slideInRight 0.3s ease-out forwards"
>
  <div class="flex-shrink-0 text-[#4A6E18] mt-0.5">
    <i data-lucide="check-circle" class="w-5 h-5"></i>
  </div>
  <div class="flex-1">
    <h3 class="text-sm font-semibold text-[#2d4a0e]">Sucesso</h3>
    <p class="mt-1 text-sm text-[#2d4a0e]/80" th:text="${mensagem}">
      Operação realizada com sucesso!
    </p>
  </div>
  <button
    type="button"
    class="flex-shrink-0 text-[#4A6E18] hover:text-[#2d4a0e] transition-colors"
    onclick="this.closest('.toast-card').remove()"
    aria-label="Fechar"
  >
    <span class="inline-flex h-4 w-4 items-center justify-center font-semibold leading-none">x</span>
  </button>
  <script th:replace="~{components/Toast :: toast-script}"></script>
  <style th:replace="~{components/Toast :: toast-style}"></style>
</div>

<script th:fragment="toast-script">
  if (typeof lucide !== "undefined") {
    lucide.createIcons();
  }

  setTimeout(function () {
    const toastCards = document.querySelectorAll(".toast-card");
    if (toastCards.length > 0) {
      const currentToast = toastCards[toastCards.length - 1];
      if (currentToast) {
        currentToast.style.opacity = "0";
        currentToast.style.transform = "translateX(100%)";
        setTimeout(() => currentToast.remove(), 500);
      }
    }
  }, 5000);
</script>

<style th:fragment="toast-style">
  @keyframes slideInRight {
    from {
      transform: translateX(100%);
      opacity: 0;
    }
    to {
      transform: translateX(0);
      opacity: 1;
    }
  }
</style>
