<div id="perfil-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 overflow-y-auto"
     onclick="if(event.target === this) { this.remove(); unlockScroll(); }">
  <div class="bg-[#f3ffe5] rounded-[40px] shadow-2xl relative w-full flex items-center justify-center p-6 mx-4 my-8 max-w-sm sm:max-w-md md:max-w-lg">
    <button type="button" onclick="document.getElementById('perfil-modal').remove()" class="absolute top-6 right-6 text-3xl text-[#4A6E18] hover:text-red-600 transition-colors z-50">
      <span class="inline-flex h-6 w-6 items-center justify-center font-semibold leading-none">x</span>
    </button>
  <form id="form-perfil-ajax" th:action="@{/usuario/editar}" th:object="${usuario}" method="post" enctype="multipart/form-data" class="flex flex-col items-center justify-center gap-6 w-full">
    <div class="w-full flex justify-center mb-0">
      <div class="flex flex-col items-center justify-center">
        <div class="relative flex-shrink-0 flex items-center justify-center w-64 h-64 md:w-72 md:h-72 lg:w-80 lg:h-80">
          <div class="flex items-center justify-center w-full h-full rounded-full">
            <div class="overflow-hidden rounded-full border-4 border-[#4A6E18] shadow-lg bg-black flex items-center justify-center w-full h-full">
              <img
                      th:if="${usuario.caminhoImagem != null}"
                      th:src="'/' + ${usuario.caminhoImagem}"
                      alt="Imagem de perfil"
                      class="object-cover w-full h-full"
                      style="object-fit: cover;"
              />
              <img
                      th:unless="${usuario.caminhoImagem != null}"
                      th:src="@{/imagens/UserIcon.png}"
                      alt="Imagem de perfil padrão"
                      class="object-cover w-full h-full"
                      style="object-fit: cover;"
              />
            </div>
          </div>
          <label
                  for="imagemPerfil"
                  class="absolute w-16 h-16 bottom-4 right-4 bg-[#4A6E18] text-white rounded-full p-4 shadow-lg hover:bg-[#7AB648] transition flex items-center justify-center border-2 border-white cursor-pointer"
                  style="display: flex; align-items: center; justify-content: center;"
                  title="Editar foto de perfil"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16.862 5.487l1.65 1.65a2.25 2.25 0 010 3.182l-7.425 7.425a2.25 2.25 0 01-1.591.659H6.75a.75.75 0 01-.75-.75v-2.746c0-.596.237-1.168.659-1.591l7.425-7.425a2.25 2.25 0 013.182 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.5 8.25l-3-3" />
            </svg>
          </label>
        </div>
        <input
                type="file"
                id="imagemPerfil"
                name="imagemPerfil"
                accept="image/*"
                class="hidden"
                onchange="previewImagem(this); window.salvarPerfil();"
        />
      </div>
    </div>
    <div class="w-full flex justify-center">
      <div class="w-full max-w-md p-2 flex flex-col items-center">
        <div class="w-full">
        <div class="flex flex-col gap-6 mb-6 w-full max-w-sm mx-auto">

          <div class="flex items-center justify-center w-full">
            <div class="flex items-center gap-3 w-full">
              <div class="flex items-start pt-8 text-[#4A6E18]">
                <span class="flex-shrink-0 flex"><i data-lucide="user" class="text-xl"></i></span>
              </div>

              <div class="flex-1 min-w-0">
                <div th:replace="~{components/Input :: flutuante-editavel('username-input', 'username', 'text', 'Nome', ${usuario.username}, true, true)}"></div>
              </div>

              <div class="flex items-start pt-8">
                <button id="username-edit-btn" type="button"
                  onclick="toggleEdit('username-input','username-edit-btn','username-save-btn')"
                  class="flex-shrink-0 w-7 h-7 text-[#4A6E18] hover:text-[#7AB648] transition-colors duration-200"
                  title="Editar nome">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                    <path d="M12 20h9"/>
                    <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                  </svg>
                </button>
                <button id="username-save-btn" type="button"
                  onclick="window.salvarPerfil()"
                  class="flex-shrink-0 w-7 h-7 hidden text-[#7AB648] hover:text-[#4A6E18] transition-colors duration-200"
                  title="Salvar nome">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="m9 12 2 2 4-4"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <div class="flex items-center justify-center w-full">
            <div class="flex items-center gap-3 w-full">
              <div class="flex items-start pt-8 text-[#4A6E18]">
                <span class="flex-shrink-0 flex"><i data-lucide="mail" class="text-xl"></i></span>
              </div>

              <div class="flex-1 min-w-0">
                <div th:replace="~{components/Input :: flutuante-editavel('email-input', 'email', 'email', 'Email', ${usuario.email}, true, true)}"></div>
              </div>

              <div class="flex items-start pt-8">
                <button id="email-edit-btn" type="button"
                  onclick="toggleEdit('email-input','email-edit-btn','email-save-btn')"
                  class="flex-shrink-0 w-7 h-7 text-[#4A6E18] hover:text-[#7AB648] transition-colors duration-200"
                  title="Editar email">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                    <path d="M12 20h9"/>
                    <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                  </svg>
                </button>
                <button id="email-save-btn" type="button"
                  onclick="window.salvarPerfil()"
                  class="flex-shrink-0 w-7 h-7 hidden text-[#7AB648] hover:text-[#4A6E18] transition-colors duration-200"
                  title="Salvar email">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="m9 12 2 2 4-4"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <div class="flex items-center justify-center w-full">
            <div class="flex items-center gap-3 w-full">
              <div class="flex items-start pt-8 text-[#4A6E18]">
                <span class="flex-shrink-0 flex"><i data-lucide="lock" class="text-xl"></i></span>
              </div>
              <div class="flex-1 min-w-0 opacity-70">
                <div th:replace="~{components/Input :: flutuante-editavel('senha-fake', 'senha-fake', 'password', 'Senha', '••••••••', false, true)}"></div>
              </div>

              <div class="flex items-start pt-8">
                <button id="senha-edit-btn" type="button"
                  onclick="abrirModalSenha()"
                  class="flex-shrink-0 w-7 h-7 text-[#4A6E18] hover:text-[#7AB648] transition-colors duration-200"
                  title="Editar senha">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full">
                    <path d="M12 20h9"/>
                    <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

            <div id="modalSenha" class="fixed inset-0 items-center justify-center bg-black/40 hidden">
              <div class="bg-[#f3ffe5] rounded-2xl shadow-2xl p-8 w-full max-w-md relative mx-4 sm:mx-0">
                <button type="button" class="absolute top-3 right-3 text-2xl text-[#b91c1c] hover:text-[#991b1b]" onclick="fecharModalSenha()"><span class="inline-flex h-6 w-6 items-center justify-center font-semibold leading-none">x</span></button>
                <div class="space-y-4">
                  <div th:replace="~{components/Input :: flutuante('senhaAtualInputModal', 'senhaAtual', 'password', 'Senha Atual', '', false)}"></div>
                  <div th:replace="~{components/Input :: flutuante('novaSenhaInputModal', 'novaSenha', 'password', 'Nova Senha', '', false)}"></div>
                  <div th:replace="~{components/Input :: flutuante('confirmarNovaSenhaInputModal', 'confirmarNovaSenha', 'password', 'Confirme a Nova Senha', '', false)}"></div>
                </div>
                <div class="flex justify-center mt-6">
                  <div th:insert="~{components/Buttom :: btn-animado('btnSalvarSenha', 'Salvar', 'button')}"
                       onclick="window.salvarPerfil()"></div>
                </div>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </form>
  </div>
</div>
