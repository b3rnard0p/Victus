<div th:fragment="conteudo" class="w-full flex flex-col items-center">
  <main
    class="flex-1 flex items-start justify-center w-full px-4 pt-8 md:pt-16 mb-16 sm:mb-0"
  >
    <div class="rounded-3xl w-full max-w-5xl sm:p-6 md:p-8 lg:p-10 xl:p-12">
      <div class="flex justify-center items-center gap-4 mb-8 relative">
        <h1 class="text-3xl font-bold text-zinc-800">Estabelecimentos</h1>

        <div
          data-hx-get="/admin/estabelecimentos/novo"
          data-hx-target="body"
          data-hx-swap="beforeend"
          class="cursor-pointer inline-block transform duration-200 hover:scale-110"
          title="Novo Estabelecimento"
        >
          <div
            th:replace="~{components/Buttom :: btn-icon(idBtn='btn-novo-estab', iconeCss='plus', tipo='button')}"
          ></div>
        </div>
      </div>

      <div id="estabelecimentos-lista" class="space-y-4">
        <th:block th:fragment="itens">
          <div
            th:each="estabelecimento : ${estabelecimentos}"
            class="bg-[#f3ffe5] rounded-[2rem] shadow-xl border border-[#4A6E18] overflow-hidden p-4 grid grid-cols-1 sm:grid-cols-3 gap-4 items-center"
          >
            <div
              class="text-2xl font-medium text-zinc-800 truncate text-center sm:text-left"
              th:text="${estabelecimento.nome}"
            ></div>

            <div
              class="text-base text-zinc-700 font-semibold text-center flex justify-center items-center"
            >
              <span
                th:text="${#lists.size(estabelecimento.usuarios)} + ' usuário(s)'"
              ></span>
            </div>

            <div class="flex justify-center sm:justify-end items-center">
              <div
                th:data-hx-get="@{/admin/estabelecimentos/{id}/editar(id=${estabelecimento.id})}"
                data-hx-target="body"
                data-hx-swap="beforeend"
                title="Editar Estabelecimento"
                class="cursor-pointer inline-block transform duration-200 hover:scale-110"
              >
                <div
                  th:replace="~{components/Buttom :: btn-icon(idBtn='btn-edit-' + ${estabelecimento.id}, iconeCss='square-pen', tipo='button')}"
                ></div>
              </div>
            </div>
          </div>

          <div
            th:if="${temMaisResultados}"
            class="load-more-container pt-2 text-center"
          >
            <div
              th:attr="hx-get=${proximaPaginaUrl}"
              hx-target="closest .load-more-container"
              hx-swap="outerHTML"
              hx-trigger="click"
              title="Carregar mais"
              class="cursor-pointer inline-block transform duration-200 hover:scale-110"
            >
              <div
                th:replace="~{components/Buttom :: btn-icon(idBtn='btn-load-more-estabelecimentos', iconeCss='plus', tipo='button')}"
              ></div>
            </div>
          </div>
        </th:block>
      </div>

      <th:block th:if="${param.action != null and param.action[0] == 'new'}">
        <div
          hx-get="/admin/estabelecimentos/novo"
          hx-trigger="load"
          hx-target="body"
          hx-swap="beforeend"
          class="hidden"
        ></div>

        <script>
          window.history.replaceState(
            {},
            document.title,
            window.location.pathname,
          );
        </script>
      </th:block>

      <div
        th:if="${paginaAtual == 0 and estabelecimentos != null and estabelecimentos.empty}"
        class="flex flex-col items-center justify-center py-12 sm:py-16 gap-4"
      >
        <div class="text-[#4A6E18]">
          <i data-lucide="store" class="text-6xl sm:text-7xl"></i>
        </div>

        <p class="text-zinc-800 text-lg sm:text-xl font-bold text-center px-4">
          Nenhum estabelecimento cadastrado.
        </p>
      </div>
    </div>
  </main>
</div>
