<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Modal de Equipamentos e Utensílios -->
<div th:fragment="modal-equipamentos(ficha)" id="modal-equipamentos" 
     class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 hidden transition-opacity duration-300"
     onclick="fecharModalEquipamentos()">
    <div class="bg-[#f3ffe5] rounded-3xl p-4 md:p-6 lg:p-10 px-4 w-[95%] sm:w-full max-w-2xl flex flex-col relative max-h-[85vh] overflow-hidden shadow-2xl"
         onclick="event.stopPropagation()" id="modal-equipamentos-content">
        
        <button type="button" class="absolute top-4 right-6 text-zinc-800 text-3xl font-bold hover:text-red-600 transition-colors z-[110]"
                onclick="fecharModalEquipamentos()">×
        </button>

        <h1 class="text-3xl md:text-4xl font-bold mb-6 text-center text-zinc-800 w-full">
            Equipamentos e Utensílios
        </h1>

        <div class="overflow-y-auto overflow-x-hidden pr-2 custom-scrollbar w-full" style="max-height: 450px;">
            <ul class="space-y-4 w-full">
                <li th:each="equipamento : ${#strings.arraySplit(ficha.preparacao().equipamentos(), '
.')}"
                    th:if="${!#strings.isEmpty(#strings.trim(equipamento))}"
                    class="flex items-start gap-3 p-4 rounded-xl bg-white/50 border border-[#7AB648]/20 hover:border-[#7AB648] transition-all group shadow-sm w-full min-w-0">
                    <span class="flex-shrink-0 w-8 h-8 rounded-full bg-[#f3ffe5] text-[#4A6E18] flex items-center justify-center font-bold border-2 border-[#4A6E18] group-hover:bg-[#4A6E18] group-hover:text-white transition-colors" th:text="${equipamentoStat.count}"></span>
                    <span class="flex-1 min-w-0 text-zinc-700 font-medium text-lg pt-0.5 break-all whitespace-normal" 
                          style="word-break: break-all; overflow-wrap: anywhere; display: block;"
                          th:text="${#strings.trim(equipamento)}"></span>
                </li>
            </ul>
        </div>
    </div>
</div>

<!-- Modal de Modo de Preparo -->
<div th:fragment="modal-preparo(ficha)" id="modal-preparo" 
     class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 hidden transition-opacity duration-300"
     onclick="fecharModalPreparo()">
    <div class="bg-[#f3ffe5] rounded-3xl p-4 md:p-6 lg:p-10 px-4 w-[95%] sm:w-full max-w-2xl flex flex-col relative max-h-[85vh] overflow-hidden shadow-2xl"
         onclick="event.stopPropagation()" id="modal-preparo-content">
        
        <button type="button" class="absolute top-4 right-6 text-zinc-800 text-3xl font-bold hover:text-red-600 transition-colors z-[110]"
                onclick="fecharModalPreparo()">×
        </button>

        <h1 class="text-3xl md:text-4xl font-bold mb-6 text-center text-zinc-800 w-full">
            Modo de Preparo
        </h1>

        <div class="overflow-y-auto overflow-x-hidden pr-2 custom-scrollbar w-full" style="max-height: 450px;">
            <ul class="space-y-4 w-full">
                <li th:each="passo : ${#strings.arraySplit(ficha.preparacao().modoPreparo(), '
.')}"
                    th:if="${!#strings.isEmpty(#strings.trim(passo))}"
                    class="flex items-start gap-3 p-4 rounded-xl bg-white/50 border border-[#7AB648]/20 hover:border-[#7AB648] transition-all group shadow-sm w-full min-w-0">
                    <span class="flex-shrink-0 w-8 h-8 rounded-full bg-[#f3ffe5] text-[#4A6E18] flex items-center justify-center font-bold border-2 border-[#4A6E18] group-hover:bg-[#4A6E18] group-hover:text-white transition-colors" th:text="${passoStat.count}"></span>
                    <p class="flex-1 min-w-0 text-zinc-700 font-medium text-lg pt-0.5 break-all whitespace-normal" 
                       style="word-break: break-all; overflow-wrap: anywhere; display: block;"
                       th:text="${#strings.trim(passo)}"></p>
                </li>
            </ul>
        </div>
    </div>
</div>

</body>
</html>
