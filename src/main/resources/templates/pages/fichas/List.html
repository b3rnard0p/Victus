<div th:fragment="conteudo" class="w-full flex flex-col items-center">
  <div
    class="flex-1 flex items-start justify-center w-full mt-4 sm:mt-8 px-2 sm:px-0"
  >
    <main
      class="p-4 sm:p-6 md:p-8 lg:p-10 w-[95%] max-w-6xl min-h-[500px] flex flex-col mb-8 mx-auto"
    >
      <div class="max-w-5xl w-full mx-auto">
        <h1
          class="text-2xl sm:text-3xl md:text-4xl font-bold text-center text-zinc-800 mb-6"
        >
          <div
            class="md:hidden flex flex-row items-center justify-center gap-4 w-full"
          >
            <div
              th:if="${usuarioLogado.cargo.name() == 'NUTRICIONISTA'}"
              class="cursor-pointer transform duration-200 hover:scale-110"
              title="Ver Arquivadas/Desarquivadas"
              th:attr="hx-get=@{/ficha/por-status(status=${statusAtual != null && statusAtual.name() == 'INATIVA' ? 'ATIVA' : 'INATIVA'})}"
              hx-target="#slot-conteudo"
            >
              <div
                th:replace="~{components/Buttom :: btn-icon-status(idBtn='toggleStatusBtn', iconeCss=${statusAtual != null && statusAtual.name() == 'INATIVA' ? 'archive-restore' : 'archive'}, tipo='button', ds=${statusAtual != null ? statusAtual : 'ATIVA'})}"
              ></div>
            </div>
            <span>Suas Fichas</span>
            <div
              th:if="${usuarioLogado.cargo.name() == 'NUTRICIONISTA'}"
              class="cursor-pointer transform duration-200 hover:scale-110"
              title="Ver Completas/Incompletas"
              th:attr="hx-get=@{/ficha/por-statusCriacao(statusCriacao=${statusCriacaoAtual != null && statusCriacaoAtual.name() == 'INCOMPLETA' ? 'COMPLETA' : 'INCOMPLETA'})}"
              hx-target="#slot-conteudo"
            >
              <div
                th:replace="~{components/Buttom :: btn-icon-criacao(idBtn='toggleStatusCriacaoBtn', iconeCss=${statusCriacaoAtual != null && statusCriacaoAtual.name() == 'INCOMPLETA' ? 'circle-check' : 'circle-dashed'}, tipo='button', dsc=${statusCriacaoAtual != null ? statusCriacaoAtual : 'COMPLETA'})}"
              ></div>
            </div>
          </div>
          <span class="hidden md:inline">Suas Fichas</span>
        </h1>

        <div
          class="flex flex-col lg:flex-row items-center lg:items-end justify-center w-full mb-6 sm:mb-8 gap-4 lg:gap-6"
        >
          <div
            th:if="${usuarioLogado.cargo.name() == 'NUTRICIONISTA'}"
            class="hidden md:flex flex-row md:flex-row items-end justify-center gap-2 sm:gap-4 pb-[2px] w-full lg:w-auto"
          >
            <div
              title="Ver Arquivadas/Desarquivadas"
              class="cursor-pointer transform duration-200 hover:scale-110"
              th:attr="hx-get=@{/ficha/por-status(status=${statusAtual != null && statusAtual.name() == 'INATIVA' ? 'ATIVA' : 'INATIVA'})}"
              hx-target="#slot-conteudo"
            >
              <div
                th:replace="~{components/Buttom :: btn-icon-status(idBtn='toggleStatusBtn', iconeCss=${statusAtual != null && statusAtual.name() == 'INATIVA' ? 'archive-restore' : 'archive'}, tipo='button', ds=${statusAtual != null ? statusAtual : 'ATIVA'})}"
              ></div>
            </div>

            <div
              title="Ver Completas/Incompletas"
              class="cursor-pointer transform duration-200 hover:scale-110"
              th:attr="hx-get=@{/ficha/por-statusCriacao(statusCriacao=${statusCriacaoAtual != null && statusCriacaoAtual.name() == 'INCOMPLETA' ? 'COMPLETA' : 'INCOMPLETA'})}"
              hx-target="#slot-conteudo"
            >
              <div
                th:replace="~{components/Buttom :: btn-icon-criacao(idBtn='toggleStatusCriacaoBtn', iconeCss=${statusCriacaoAtual != null && statusCriacaoAtual.name() == 'INCOMPLETA' ? 'circle-check' : 'circle-dashed'}, tipo='button', dsc=${statusCriacaoAtual != null ? statusCriacaoAtual : 'COMPLETA'})}"
              ></div>
            </div>
          </div>

          <form
            id="pesquisaForm"
            class="m-0 p-0 w-full lg:w-auto"
            onsubmit="event.preventDefault()"
            th:with="tipoAtual=${param.tipoPesquisa != null ? param.tipoPesquisa[0] : 'especifico'},
               campoAtual=${param.campo != null ? param.campo[0] : (param.nome != null ? 'por-nome' : (param.categoria != null ? 'por-categoria' : (param.custoPerCapita != null ? 'custoPerCapita' : (param.custoTotal != null ? 'custoTotal' : (param.rendimento != null ? 'por-rendimento' : (param.numero != null ? 'por-numero' : (param.vtc != null ? 'vtc' : (param.gramasPTN != null ? 'gramasPTN' : (param.gramasCHO != null ? 'gramasCHO' : (param.gramasLIP != null ? 'gramasLIP' : (param.gramasSodio != null ? 'gramasSodio' : (param.gramasSaturada != null ? 'gramasSaturada' : ''))))))))))))},
               tagAtual=${param.tag != null ? param.tag[0] : ''},
               categoriaAtual=${param.categoria != null ? param.categoria[0] : ''},
               valorAtual=${param.valorPesquisa != null ? param.valorPesquisa[0] : (param.nome != null ? param.nome[0] : (param.custoPerCapita != null ? param.custoPerCapita[0] : (param.custoTotal != null ? param.custoTotal[0] : (param.rendimento != null ? param.rendimento[0] : (param.numero != null ? param.numero[0] : (param.vtc != null ? param.vtc[0] : (param.gramasPTN != null ? param.gramasPTN[0] : (param.gramasCHO != null ? param.gramasCHO[0] : (param.gramasLIP != null ? param.gramasLIP[0] : (param.gramasSodio != null ? param.gramasSodio[0] : (param.gramasSaturada != null ? param.gramasSaturada[0] : '')))))))))))},
               pesquisaAtiva=${param.campo != null or param.tag != null or param.valorPesquisa != null or param.nome != null or param.categoria != null or param.custoPerCapita != null or param.custoTotal != null or param.rendimento != null or param.numero != null or param.vtc != null or param.gramasPTN != null or param.gramasCHO != null or param.gramasLIP != null or param.gramasSodio != null or param.gramasSaturada != null}"
            th:unless="${usuarioLogado.cargo.name() == 'NUTRICIONISTA' and (statusAtual?.name() == 'INATIVA' || statusCriacaoAtual?.name() == 'INCOMPLETA')}"
          >
            <div
              class="flex flex-col lg:flex-row items-center lg:items-end justify-center gap-4 lg:gap-4 w-full"
            >
              <div
                class="flex flex-row items-end justify-center gap-2 w-full lg:w-auto"
              >
                <div class="relative w-40 sm:w-52 lg:w-52">
                  <th:block
                    th:replace="~{components/ComboBox :: comboBox(id='campoPesquisa', label='Filtrar por...', name='campoPesquisa', options=${filtroFichaOptions}, selectedValue=${campoAtual})}"
                  ></th:block>

                  <div
                    class="absolute top-full mt-2 left-0 w-full flex flex-row justify-center gap-3 z-0"
                  >
                    <button
                      type="button"
                      id="btnPesquisaEspecifica"
                      th:class="${tipoAtual == 'especifico'} ? 'group relative flex items-center justify-center w-7 h-7 rounded-full border-2 bg-[#7AB648] border-[#4A6E18] text-green-950 shadow transition-all duration-200 focus:outline-none' : 'group relative flex items-center justify-center w-7 h-7 rounded-full border-2 bg-[#f3ffe5] border-[#4A6E18] text-green-950 transition-all duration-200 focus:outline-none'"
                      title="Pesquisa Específica"
                    >
                      <i data-lucide="search" class="w-[10px] h-[10px]"></i>
                    </button>

                    <button
                      type="button"
                      id="btnPesquisaTag"
                      th:class="${tipoAtual == 'tags'} ? 'group relative flex items-center justify-center w-7 h-7 rounded-full border-2 bg-[#7AB648] border-[#4A6E18] text-green-950 shadow transition-all duration-200 focus:outline-none' : 'group relative flex items-center justify-center w-7 h-7 rounded-full border-2 bg-[#f3ffe5] border-[#4A6E18] text-green-950 transition-all duration-200 focus:outline-none'"
                      title="Pesquisa por Tags"
                    >
                      <i data-lucide="tag" class="w-[10px] h-[10px]"></i>
                    </button>
                  </div>
                </div>
              </div>

              <div
                class="flex flex-row items-end justify-center gap-2 w-full lg:w-auto"
              >
                <div
                  id="wrapperValorPesquisa"
                  th:class="${tipoAtual == 'tags' or campoAtual == 'por-categoria'} ? 'hidden w-full sm:w-72' : 'w-full sm:w-72'"
                  th:style="${tipoAtual == 'tags' or campoAtual == 'por-categoria'} ? 'display:none;' : 'display:block;'"
                >
                  <div
                    th:replace="~{components/Input :: flutuante(id='valorPesquisa', name='valorPesquisa', type='text', label='Valor do campo', value=${valorAtual}, required=false)}"
                  ></div>
                </div>

                <div
                  id="wrapperTagPesquisa"
                  th:class="${tipoAtual == 'tags'} ? 'w-full sm:w-72' : 'hidden w-full sm:w-72'"
                  th:style="${tipoAtual == 'tags'} ? 'display:block;' : 'display:none;'"
                >
                  <th:block
                    th:replace="~{components/ComboBox :: comboBox(id='tagPesquisa', label='Nível da Tag', name='tagPesquisa', options=${tagNivelOptions}, selectedValue=${tagAtual})}"
                  ></th:block>
                </div>

                <div
                  id="wrapperCategoriaPesquisa"
                  th:class="${campoAtual == 'por-categoria' and tipoAtual != 'tags'} ? 'w-full sm:w-72' : 'hidden w-full sm:w-72'"
                  th:style="${campoAtual == 'por-categoria' and tipoAtual != 'tags'} ? 'display:block;' : 'display:none;'"
                >
                  <th:block
                    th:replace="~{components/ComboBox :: comboBox(id='categoriaPesquisa', label='Categoria', name='categoriaPesquisa', options=${categorias}, selectedValue=${categoriaAtual}, valField='value', labelField='label', emptyLabel='Selecione')}"
                  ></th:block>
                </div>

                <div class="pb-[2px]" title="Pesquisar">
                  <div
                    id="btnPesquisar"
                    class="cursor-pointer transform duration-200 hover:scale-110"
                  >
                    <div
                      th:replace="~{components/Buttom :: btn-icon(idBtn='btn-search', iconeCss='search', tipo='button')}"
                    ></div>
                  </div>
                </div>

                <div
                  id="btnLimparFiltro"
                  th:class="${pesquisaAtiva} ? 'pb-[2px] cursor-pointer transform duration-200 hover:scale-110' : 'hidden pb-[2px] cursor-pointer transform duration-200 hover:scale-110'"
                  title="Limpar Pesquisa"
                >
                  <div
                    th:replace="~{components/Buttom :: btn-icon(idBtn='btn-clear', iconeCss='eraser text-red-600', tipo='button')}"
                  ></div>
                </div>
              </div>
            </div>

            <input type="hidden" id="tipoPesquisa" th:value="${tipoAtual}" />
          </form>
        </div>

        <div id="fichas-lista" class="space-y-3 sm:space-y-4 pt-4">
          <th:block th:fragment="itens">
            <div
              th:if="${fichas != null}"
              th:each="ficha : ${fichas}"
              class="bg-[#f3ffe5] border border-[#4A6E18] shadow flex flex-col rounded-[2rem] transition-all duration-300 relative overflow-hidden"
            >
              <div
                class="px-6 py-4 flex flex-col sm:flex-row items-center justify-between relative gap-4"
              >
                <div
                  class="flex items-center gap-3 w-full sm:w-1/3 justify-center sm:justify-start"
                >
                  <h2
                    class="text-lg sm:text-xl md:text-2xl font-bold text-zinc-800 truncate text-center sm:text-left"
                    th:text="${isComTagDTO != null and isComTagDTO} ? ${ficha.nomePreparacao} : ${ficha.preparacao.nome}"
                  ></h2>
                </div>

                <div
                  class="flex items-center justify-between gap-3 w-full sm:w-1/3 min-w-0"
                >
                  <span
                    class="text-sm sm:text-base px-3 py-1 rounded-full border border-[#4A6E18] text-zinc-800 font-medium whitespace-nowrap truncate max-w-[72%]"
                    th:text="${isComTagDTO != null and isComTagDTO} ? ${ficha.categoriaPreparacao} : ${ficha.preparacao.categoria.nome}"
                  ></span>
                  <span
                    class="shrink-0 text-sm sm:text-base font-medium text-zinc-800 whitespace-nowrap text-right"
                    >Nº:
                    <span
                      th:text="${isComTagDTO != null and isComTagDTO} ? ${ficha.numeroPreparacao} : ${ficha.preparacao.numero}"
                    ></span
                  ></span>
                </div>

                <div
                  class="flex gap-2 w-full sm:w-1/3 justify-center sm:justify-end"
                >
                  <a
                    th:href="@{/ficha/{id}(id=${ficha.id})}"
                    class="text-[#7AB648] hover:text-[#4A6E18] transition-colors p-2 rounded-full"
                    title="Ver Ficha"
                  >
                    <i data-lucide="eye" class="text-xl"></i>
                  </a>

                  <a
                    th:href="@{/ficha/exportar-pdf/{id}(id=${ficha.id})}"
                    class="text-[#7AB648] hover:text-[#4A6E18] transition-colors p-2 rounded-full"
                    title="Exportar PDF"
                  >
                    <i data-lucide="download" class="text-xl"></i>
                  </a>
                </div>
              </div>
            </div>

            <div
              th:if="${temMaisResultados}"
              class="load-more-container pt-2 text-center"
            >
              <div
                th:attr="hx-get=${proximaPaginaUrl}"
                hx-target="closest .load-more-container"
                hx-swap="outerHTML"
                hx-trigger="click"
                title="Carregar mais"
                class="cursor-pointer inline-block transform duration-200 hover:scale-110"
              >
                <div
                  th:replace="~{components/Buttom :: btn-icon(idBtn='btn-load-more-fichas', iconeCss='plus', tipo='button')}"
                ></div>
              </div>
            </div>
          </th:block>
        </div>

        <div
          th:if="${paginaAtual == 0 and fichas != null and fichas.empty}"
          class="text-black text-lg sm:text-xl text-center flex flex-col items-center justify-center py-12 sm:py-16 gap-4"
        >
          <div class="text-[#4A6E18]">
            <i data-lucide="file-text" class="text-6xl sm:text-7xl"></i>
          </div>

          <p
            class="text-zinc-800 text-lg sm:text-xl font-bold text-center px-4"
          >
            Nenhuma ficha encontrada.
          </p>
        </div>
      </div>
    </main>
  </div>

  <div
    class="hidden bg-green-200 border-green-700 text-green-900 shadow bg-white border-gray-300 text-gray-400"
  ></div>
  <span class="bg-[#599e4a] hidden"></span>
  <span class="bg-[#7AB648] hidden"></span>
  <span class="bg-[#f3ffe5] hidden"></span>
  <span class="border-green-900 hidden"></span>
  <span class="border-[#4A6E18] hidden"></span>
  <span class="text-green-950 hidden"></span>
  <span class="shadow hidden"></span>
  <span class="bg-white hidden"></span>
  <span class="border-gray-300 hidden"></span>
  <span class="text-gray-400 hidden"></span>

  <script
    th:src="@{/Scripts/pages/fichas/ScriptListFicha.js(v='20260511-01')}"
  ></script>
</div>
