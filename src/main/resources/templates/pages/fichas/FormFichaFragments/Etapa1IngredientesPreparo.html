<th:block th:fragment="etapa1">
  <div
    class="max-h-[3000px] opacity-100 pb-6 transition-all duration-500 ease-in-out px-2 sm:px-6 pt-4 sm:pt-6 border-t border-black/20 w-full overflow-hidden bg-[#f3ffe5]"
  >
    <div
      class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 border-b pb-7 w-full"
    >
      <div class="w-full">
        <div
          th:replace="~{components/Input :: flutuante(id='nomePreparacao', name='preparacao.nome', type='text', label='Nome da preparação', value=*{preparacao.nome}, required=false)}"
        ></div>
      </div>

      <div class="flex flex-col sm:flex-row justify-end gap-4 w-full">
        <div class="w-full sm:w-52">
          <div
            th:replace="~{components/ComboBox :: comboBox(
                      id='categoria',
                      label='Categoria',
                      name='preparacao.categoria',
                      options=${categorias},
                      selectedValue=${ficha?.preparacao?.categoria != null ? ficha.preparacao.categoria.toString() : ''},
                      valField='value',
                      labelField='label',
                      emptyLabel='Categoria'
                  )}"
          ></div>
        </div>

        <div class="w-full sm:w-20">
          <div
            th:replace="~{components/Input :: flutuante(id='numeroPreparacao', name='preparacao.numero', type='number', label='Nº', value=*{preparacao.numero}, required=false)}"
          ></div>
        </div>
      </div>
    </div>
    <div class="mb-6 w-full overflow-visible">
      <table class="min-w-full w-full border-collapse block md:table">
        <thead class="border border-[#4A6E18] hidden 950:table-header-group">
          <tr>
            <th
              class="px-2 py-2 text-center text-xs border border-[#4A6E18] font-medium text-zinc-800"
            >
              <div class="flex items-center justify-center gap-2">
                <span>INGREDIENTES</span>
                <div
                  class="cursor-pointer inline-flex items-center justify-center"
                  onclick="abrirModalIngrediente()"
                  aria-label="Adicionar ingrediente"
                >
                  <div
                    th:replace="~{components/Buttom :: btn-icon-sm(idBtn='btn-open-modal-ingred-desktop', iconeCss='plus', tipo='button')}"
                  ></div>
                </div>
              </div>
            </th>
            <th
              class="px-2 py-2 text-center text-xs border border-[#4A6E18] font-medium text-zinc-800"
            >
              MEDIDA
            </th>
            <th
              class="px-1 py-2 text-center text-xs border border-[#4A6E18] font-medium text-zinc-800"
            >
              PB (g)
            </th>
            <th
              class="px-1 py-2 text-center text-xs border border-[#4A6E18] font-medium text-zinc-800"
            >
              PL (g)
            </th>
            <th
              class="px-1 py-2 text-center text-xs border border-[#4A6E18] font-medium text-zinc-800"
            >
              FC
            </th>
            <th
              class="px-2 py-2 text-center text-xs border border-[#4A6E18] font-medium text-zinc-800"
            >
              CUSTO (KG)
            </th>
            <th
              class="px-2 py-2 text-center text-xs border border-[#4A6E18] font-medium text-zinc-800"
            >
              CUSTO (USADO)
            </th>
            <th
              class="px-2 py-2 text-center text-xs border border-[#4A6E18] font-medium text-zinc-800"
            >
              AÇÕES
            </th>
          </tr>
        </thead>

        <tbody id="ingredientesAdicionados" class="block 950:table-row-group">
          <tr
            th:each="ingrediente, stat : ${ficha.ingredientes}"
            class="ingrediente-row grid grid-cols-6 gap-x-2 gap-y-3 p-4 mb-4 border border-[#4A6E18] rounded-lg 950:table-row 950:gap-0 950:p-0 950:mb-0 950:border-none 950:rounded-none"
            th:attr="data-ingrediente-id=${ingrediente.id}"
          >
            <input
              type="hidden"
              class="ingrediente-ptn"
              th:value="${ingrediente.ingrediente.ptn}"
            />
            <input
              type="hidden"
              class="ingrediente-cho"
              th:value="${ingrediente.ingrediente.cho}"
            />
            <input
              type="hidden"
              class="ingrediente-lip"
              th:value="${ingrediente.ingrediente.lip}"
            />
            <input
              type="hidden"
              class="ingrediente-sodio"
              th:value="${ingrediente.ingrediente.sodio}"
            />
            <input
              type="hidden"
              class="ingrediente-saturada"
              th:value="${ingrediente.ingrediente.gorduraSaturada}"
            />

            <td
              class="col-span-6 block 950:table-cell px-2 py-2 border-none 950:border 950:border-[#4A6E18] text-center text-sm font-bold 950:font-normal bg-[#f3ffe5] 950:bg-transparent rounded-md 950:rounded-none"
              th:text="${ingrediente.ingrediente.nome}"
            ></td>

            <td
              class="col-span-6 block 950:table-cell px-2 py-2 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <span
                class="950:hidden text-xs text-gray-800 font-bold block mb-1"
                >Medida Caseira</span
              >
              <input
                type="text"
                th:field="*{ingredientes[__${stat.index}__].medidaCaseira}"
                class="w-full rounded p-1 text-center text-sm text-gray-800 border border-[#4A6E18] 950:border-none focus:ring-1 focus:ring-green-800 bg-transparent"
              />
            </td>

            <td
              class="col-span-2 block 950:table-cell px-1 py-2 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <span
                class="950:hidden text-xs text-gray-800 font-bold block mb-1"
                >PB (g)</span
              >
              <input
                type="number"
                step="0.01"
                th:field="*{ingredientes[__${stat.index}__].pb}"
                class="w-full 950:w-16 rounded p-1 text-center text-sm text-gray-800 border border-[#4A6E18] 950:border-none bg-transparent"
              />
            </td>

            <td
              class="col-span-2 block 950:table-cell px-1 py-2 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <span
                class="950:hidden text-xs text-gray-800 font-bold block mb-1"
                >PL (g)</span
              >
              <input
                type="number"
                step="0.01"
                th:field="*{ingredientes[__${stat.index}__].pl}"
                class="w-full 950:w-16 rounded p-1 text-center text-sm text-gray-800 border border-[#4A6E18] 950:border-none bg-transparent"
              />
            </td>

            <td
              class="col-span-2 block 950:table-cell px-1 py-2 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <span
                class="950:hidden text-xs text-gray-800 font-bold block mb-1"
                >FC</span
              >
              <input
                type="number"
                step="0.01"
                th:field="*{ingredientes[__${stat.index}__].fc}"
                class="w-full 950:w-14 950:mx-auto rounded p-1 fc-edit text-center text-sm text-gray-800 border border-[#4A6E18] 950:border-none bg-transparent"
                readonly
                tabindex="-1"
              />
            </td>

            <td
              class="col-span-3 block 950:table-cell px-2 py-2 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <span
                class="950:hidden text-xs text-gray-800 font-bold block mb-1"
                >Custo/Kg (R$)</span
              >
              <input
                type="number"
                step="0.01"
                th:field="*{ingredientes[__${stat.index}__].custoKg}"
                class="w-full 950:w-20 rounded p-1 text-center text-sm text-gray-800 border border-[#4A6E18] 950:border-none bg-transparent"
              />
            </td>

            <td
              class="col-span-3 block 950:table-cell px-2 py-2 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <span
                class="950:hidden text-xs text-gray-800 font-bold block mb-1"
                >Custo Usado</span
              >
              <input
                type="number"
                step="0.01"
                th:field="*{ingredientes[__${stat.index}__].custoUsado}"
                class="w-full 950:w-20 rounded p-1 custo-usado-edit bg-[#f3ffe5] text-center text-sm text-gray-800 border border-[#4A6E18] 950:border-none"
                readonly
                tabindex="-1"
              />
            </td>

            <td
              class="col-span-6 block 950:table-cell 950:align-middle px-2 py-2 text-center border-none 950:border 950:border-[#4A6E18]"
            >
              <button
                type="button"
                onclick="removerIngrediente(this)"
                class="text-red-600 hover:text-red-800 transition-colors w-full py-2 rounded-md 950:border-none 950:w-auto 950:p-0 950:mx-auto flex 950:inline-flex justify-center items-center gap-2"
              >
                <i data-lucide="trash-2" class="text-lg"></i>
                <span class="950:hidden font-semibold">Remover</span>
              </button>
            </td>

            <input
              type="hidden"
              th:field="*{ingredientes[__${stat.index}__].id}"
            />
            <input
              type="hidden"
              th:field="*{ingredientes[__${stat.index}__].ingredienteId}"
            />
          </tr>
        </tbody>

        <tfoot class="bg-[#f3ffe5] block 950:table-row-group">
          <tr
            class="grid grid-cols-6 gap-x-2 gap-y-3 p-4 border border-[#4A6E18] rounded-lg 950:table-row 950:gap-0 950:p-0 950:border-none 950:rounded-none"
          >
            <td
              class="col-span-6 block 950:table-cell border-none 950:border 950:border-[#4A6E18] text-center relative z-10"
            >
              <div class="w-full min-w-[150px] flex items-center gap-2">
                <select id="ingredienteSelect" class="hidden">
                  <option value="">Selecione...</option>
                </select>
                <div class="flex-1 relative">
                  <div
                    th:replace="~{components/Input :: flutuante(id='ingredienteSearch', name='', type='text', label='Buscar Ingrediente...', value='', required=false)}"
                  ></div>
                  <div
                    id="ingredienteSuggestions"
                    class="hidden absolute left-0 right-0 top-[calc(100%+5px)] z-[9999] bg-[#f3ffe5] border border-[#4A6E18] rounded-[10px] shadow-lg shadow-green-950/20 max-h-60 overflow-y-auto overflow-x-hidden text-left [&::-webkit-scrollbar]:w-[5px] [&::-webkit-scrollbar-thumb]:bg-[#4A6E18] [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-transparent"
                  ></div>
                </div>
                <div
                  class="950:hidden cursor-pointer inline-flex mt-6 items-center justify-center"
                  onclick="abrirModalIngrediente()"
                  aria-label="Adicionar ingrediente"
                >
                  <div
                    th:replace="~{components/Buttom :: btn-icon-sm(idBtn='btn-open-modal-ingred-mobile', iconeCss='plus', tipo='button')}"
                  ></div>
                </div>
              </div>
            </td>

            <td
              class="col-span-6 block 950:table-cell px-1 py-1 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <div
                th:replace="~{components/Input :: flutuante(id='medidaCaseira', name='', type='text', label='Ex: 1 xícara', value='', required=false)}"
              ></div>
            </td>

            <td
              class="col-span-2 block 950:table-cell px-1 py-1 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <div
                th:replace="~{components/Input :: flutuante(id='pb', name='', type='number', label='PB', value='', required=false)}"
              ></div>
            </td>

            <td
              class="col-span-2 block 950:table-cell px-1 py-1 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <div
                th:replace="~{components/Input :: flutuante(id='pl', name='', type='number', label='PL', value='', required=false)}"
              ></div>
            </td>

            <td
              class="col-span-2 block 950:table-cell px-1 py-1 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <span
                class="950:hidden text-xs text-gray-800 font-bold block mb-1"
                >FC</span
              >
              <div
                class="mt-6 w-full border border-[#4A6E18] rounded-md p-2 text-sm text-center min-h-[42px] flex items-center justify-center font-bold"
              >
                <span class="fc-display">1.00</span>
              </div>
              <input type="hidden" class="fc-value" name="fc" value="1.00" />
            </td>

            <td
              class="col-span-3 block 950:table-cell px-1 py-1 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <div
                th:replace="~{components/Input :: flutuante(id='custoKg', name='', type='number', label='R$', value='', required=false)}"
              ></div>
            </td>

            <td
              class="col-span-3 block 950:table-cell px-1 py-1 border-none 950:border 950:border-[#4A6E18] text-center"
            >
              <div
                th:replace="~{components/Input :: flutuante-editavel(id='custoUsado', name='custoUsado', type='number', label='Custo Usado', value='', required=false, disabled=true)}"
              ></div>
            </td>

            <td
              class="col-span-6 block 950:table-cell 950:align-middle text-center border-none 950:border 950:border-[#4A6E18] pb-2 950:pb-0"
            >
              <div
                class="cursor-pointer flex justify-center w-full 950:mt-6"
                onclick="adicionarIngrediente()"
              >
                <div
                  th:replace="~{components/Buttom :: btn-icon(idBtn='btn-add-ingred', iconeCss='plus', tipo='button')}"
                ></div>
              </div>
            </td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div
      class="grid grid-cols-1 md:grid-cols-10 gap-4 mb-6 border-t pt-4 border-[#4A6E18]"
    >
      <div class="md:col-span-7">
        <textarea
          placeholder="Equipamentos e utensílios utilizados"
          class="mt-8 block w-full border border-[#4A6E18] rounded-md p-3 resize-none focus:ring-2 focus:ring-[#7AB648] outline-none bg-transparent"
          rows="2"
          id="autoExpandTextarea"
          th:field="*{preparacao.equipamentos}"
        ></textarea>
      </div>
      <div class="md:col-span-3 flex flex-col items-end mt-5">
        <div class="w-full flex items-center justify-end">
          <div
            th:replace="~{components/Input :: flutuante-editavel(id='custoTotalVisivel', name='', type='number', label='Custo Total R$', value=*{custoTotal}, required=false, disabled=true)}"
          ></div>
        </div>
      </div>
      <div class="md:col-span-7">
        <textarea
          placeholder="Modo de preparo"
          class="mt-8 block w-full border border-[#4A6E18] rounded-md p-3 resize-none focus:ring-2 focus:ring-[#7AB648] outline-none bg-transparent"
          rows="2"
          id="autoExpandTextarea2"
          th:field="*{preparacao.modoPreparo}"
        ></textarea>
      </div>
      <div class="md:col-span-3 flex flex-col items-end mt-5">
        <div class="w-full flex items-center justify-end">
          <div
            th:replace="~{components/Input :: flutuante-editavel(id='custoPerCapitaVisivel', name='', type='number', label='Custo Per Cap. R$', value=*{custoPerCapita}, required=false, disabled=true)}"
          ></div>
        </div>
      </div>
    </div>
  </div>
</th:block>
