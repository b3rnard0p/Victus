<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro Concluído</title>
    <link rel="icon" type="image/avif" th:href="@{/imagens/Logo.avif}" />
    <link rel="stylesheet" th:href="@{/output.css}" />
    <script th:src="@{/Scripts/vendor/lucide.min.js}" defer></script>
    <script th:src="@{/Scripts/lucide-init.js}" defer></script>
  </head>
  <body class="bg-[#f3ffe5] min-h-screen flex items-center justify-center p-4">
    <div
      class="w-full max-w-2xl bg-[#f3ffe5] rounded-2xl shadow-xl overflow-hidden"
    >
      <div class="p-8 text-center">
        <div class="flex justify-center mb-6">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-20 w-20 text-[#4A6E18]"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </div>

        <h1 class="text-3xl font-bold text-zinc-800 mb-4">
          Registro Concluído com Sucesso!
        </h1>

        <p class="text-lg text-zinc-700 mb-6">
          Sua conta foi criada e está aguardando aprovação do administrador.
        </p>

        <div
          class="border border-[#4A6E18] flex justify-center p-4 mb-6 rounded"
        >
          <div class="flex">
            <div class="flex-shrink-0">
              <svg
                class="h-5 w-5 text-[#4A6E18]"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path
                  fill-rule="evenodd"
                  d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2h-1V9z"
                  clip-rule="evenodd"
                />
              </svg>
            </div>
            <div class="ml-3">
              <p class="text-sm text-zinc-800">
                Você receberá um e-mail assim que sua conta for ativada.
              </p>
            </div>
          </div>
        </div>

        <div class="mt-8">
          <a
            th:href="@{/}"
            data-hx-push-url="true"
            class="relative group inline-flex items-center justify-center w-12 h-12 cursor-pointer transform duration-200 hover:scale-110"
          >
            <span
              class="absolute inset-0 rounded-full border-2 border-[#7AB648] transition-all duration-300 ease-out group-hover:-inset-1"
            ></span>
            <span
              class="absolute inset-0 w-full h-full rounded-full bg-[#f3ffe5] border-2 border-[#4A6E18]"
            ></span>
            <i
              data-lucide="home"
              class="relative z-10 text-[#4A6E18] text-xl"
            ></i>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
