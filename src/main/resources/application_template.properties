spring.application.name=SistemaNutricao

# Database Configuration
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/YOUR_DATABASE_NAME?createDatabaseIfNotExist=true
spring.datasource.username=YOUR_USERNAME
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# File Upload Configuration
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
spring.web.resources.static-locations=classpath:/static/,file:./uploads/,file:./src/main/resources/static/

# Hidden Method Filter
spring.mvc.hiddenmethod.filter.enabled=true

# Security & JWT
app.jwt.secret=REPLACE_WITH_A_SECURE_RANDOM_KEY_AT_LEAST_32_CHARS
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# TACO Bootstrap Configuration
app.taco.username=TACO
app.taco.email=taco@sistema.local
app.taco.password=REPLACE_WITH_A_PASSWORD
app.bootstrap.enabled=true

# Cookie Configuration
app.cookie.access-token-max-age-seconds=900
app.cookie.refresh-token-max-age-seconds=604800
app.cookie.secure=false
app.cookie.same-site=Strict
